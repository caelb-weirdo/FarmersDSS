<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Farmer's Hub DSS</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <img src="logo.png" alt="Farmer's Hub DSS Logo" class="brand-mark-auth brand-logo-auth" />
          <h1>Farmer's Hub DSS</h1>
          <p class="auth-subtitle">Smart decisions for every harvest</p>
        </div>

        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label for="register-fullname">Full Name</label>
            <input
              id="register-fullname"
              type="text"
              name="fullName"
              placeholder="Your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="register-email">Email Address</label>
            <input
              id="register-email"
              type="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <div class="password-input-wrap">
              <input
                id="register-password"
                type="password"
                name="password"
                placeholder="Create a password"
                required
              />
              <button type="button" class="password-toggle" aria-label="Show password">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="register-password-confirm">Confirm Password</label>
            <div class="password-input-wrap">
              <input
                id="register-password-confirm"
                type="password"
                name="passwordConfirm"
                placeholder="Confirm your password"
                required
              />
              <button type="button" class="password-toggle" aria-label="Show password">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="primary-button">Create Account</button>

          <p class="auth-error" id="register-error"></p>
        </form>

        <div class="auth-footer">
          <p>
            Already have an account?
            <a href="login.html">Sign in</a>
          </p>
        </div>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
